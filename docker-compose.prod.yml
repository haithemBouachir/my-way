services:
  mysql:
    image: mysql:8.4
    container_name: myway-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myway}
      MYSQL_USER: ${MYSQL_USER:-myway_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    container_name: myway-backend
    restart: always
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-myway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-myway_user}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: myway-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
