spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: my-way-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:mywaydb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  jwt:
    secret: ${JWT_SECRET:my-way-super-secret-key-change-me-1234567890}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
