name: Deploy My Way

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform state bucket access
        run: |
          aws s3api head-bucket --bucket "${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=my-way/${{ github.actor }}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}"

      - name: Terraform output
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Show app URL
        run: |
          echo "App URL: http://${{ steps.tf_output.outputs.instance_public_ip }}"
          echo "### App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ steps.tf_output.outputs.instance_public_ip }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.build.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 40m
          debug: true
          script: |
            set -euxo pipefail
            export GIT_TERMINAL_PROMPT=0

            MYSQL_DATABASE='${{ secrets.MYSQL_DATABASE }}'
            MYSQL_USER='${{ secrets.MYSQL_USER }}'
            MYSQL_PASSWORD='${{ secrets.MYSQL_PASSWORD }}'
            MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}'
            JWT_SECRET='${{ secrets.JWT_SECRET }}'
            CORS_ALLOWED_ORIGINS='${{ secrets.CORS_ALLOWED_ORIGINS }}'

            missing_secrets=""
            for secret_name in MYSQL_DATABASE MYSQL_USER MYSQL_PASSWORD MYSQL_ROOT_PASSWORD JWT_SECRET CORS_ALLOWED_ORIGINS; do
              if [ -z "$(eval echo \$$secret_name)" ]; then
                missing_secrets="$missing_secrets $secret_name"
              fi
            done

            if [ -n "$missing_secrets" ]; then
              echo "Missing required GitHub secrets:$missing_secrets"
              exit 1
            fi

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting remote deploy"

            if ! command -v docker >/dev/null 2>&1; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Installing Docker"
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker ubuntu
            fi

            if ! command -v git >/dev/null 2>&1; then
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Installing git"
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y git
            fi

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Syncing repository"
            cd /home/ubuntu
            if [ ! -d /home/ubuntu/my-way/.git ]; then
              git clone --depth 1 https://github.com/${{ github.repository }}.git /home/ubuntu/my-way
            fi

            cd /home/ubuntu/my-way
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Repository remotes"
            git remote -v
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Fetch latest commit"
            git -c credential.helper= -c core.askPass=true fetch --all --prune
            git reset --hard origin/${{ github.ref_name }}

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Writing runtime env"
            {
              printf '%s\n' "MYSQL_DATABASE=$MYSQL_DATABASE"
              printf '%s\n' "MYSQL_USER=$MYSQL_USER"
              printf '%s\n' "MYSQL_PASSWORD=$MYSQL_PASSWORD"
              printf '%s\n' "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD"
              printf '%s\n' "JWT_SECRET=$JWT_SECRET"
              printf '%s\n' "JWT_EXPIRATION_SECONDS=86400"
              printf '%s\n' "VITE_API_BASE_URL=/api/v1"
              printf '%s\n' "CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS"
            } > /home/ubuntu/my-way/.env

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Validating docker compose config"
            sudo docker compose --env-file .env config >/dev/null

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Docker compose build"
            timeout 25m sudo docker compose --env-file .env build --progress=plain

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Docker compose up"
            sudo docker compose --env-file .env up -d --no-build

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Docker compose status"
            sudo docker compose --env-file .env ps

      - name: Show final app URL
        run: |
          echo "App URL: http://${{ needs.build.outputs.ec2_ip }}"
          echo "### Final App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ needs.build.outputs.ec2_ip }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend health endpoint
        id: healthcheck
        continue-on-error: true
        run: |
          set -e
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "http://${{ needs.build.outputs.ec2_ip }}/api/v1/health" || true)
            echo "Attempt $i HTTP=$code"
            if [ "$code" = "200" ]; then
              echo "Backend health is OK"
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Collect remote docker diagnostics
        if: steps.healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.build.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set +e
            cd /home/ubuntu/my-way
            echo "=== docker compose ps ==="
            sudo docker compose ps
            echo "=== backend logs (last 200) ==="
            sudo docker compose logs --tail=200 backend
            echo "=== mysql logs (last 200) ==="
            sudo docker compose logs --tail=200 mysql

      - name: Fail workflow when backend unhealthy
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "Backend health endpoint is not reachable after deploy. Check diagnostics above."
          exit 1
