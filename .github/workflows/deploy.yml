name: Deploy My Way

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase image owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./my-way-backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/my-way-backend:${{ github.sha }},ghcr.io/${{ env.OWNER }}/my-way-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./my-way-frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/my-way-frontend:${{ github.sha }},ghcr.io/${{ env.OWNER }}/my-way-frontend:latest
          build-args: VITE_API_BASE_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    runs-on: ubuntu-latest
    # runs in parallel with build-images
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
      ec2_instance_id: ${{ steps.tf_output.outputs.instance_id }}
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform state bucket access
        run: |
          aws s3api head-bucket --bucket "${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=my-way/${{ github.actor }}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}"

      - name: Terraform output
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"

      - name: Show app URL
        run: |
          echo "App URL: http://${{ steps.tf_output.outputs.instance_public_ip }}"
          echo "### App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ steps.tf_output.outputs.instance_public_ip }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-images, infra]
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Inspect EC2 network and SSH rules
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ needs.infra.outputs.ec2_instance_id }}"

          echo "EC2 instance details"
          aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].{State:State.Name,PublicIp:PublicIpAddress,Subnet:SubnetId,Vpc:VpcId,SGs:SecurityGroups[*].GroupId}' \
            --output table

          SG_IDS=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[*].GroupId' \
            --output text)

          for SG in $SG_IDS; do
            echo "Security group $SG ingress rules"
            aws ec2 describe-security-groups \
              --group-ids "$SG" \
              --query 'SecurityGroups[0].IpPermissions[?ToPort==`22` || FromPort==`22`].[IpProtocol,FromPort,ToPort,IpRanges[*].CidrIp]' \
              --output table
          done

      - name: Wait for EC2 SSH to be ready
        run: |
          set -euo pipefail
          echo "Waiting for SSH on ${{ needs.infra.outputs.ec2_ip }}:22 ..."
          for i in $(seq 1 30); do
            if timeout 5 bash -lc "</dev/tcp/${{ needs.infra.outputs.ec2_ip }}/22" 2>/dev/null; then
              echo "SSH is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 - not ready, waiting 10s..."
            sleep 10
          done
          echo "EC2 SSH did not become ready in 5 minutes"
          exit 1

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -euo pipefail
            export GIT_TERMINAL_PROMPT=0

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Installing Docker if needed"
            if ! command -v docker >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin git
              sudo usermod -aG docker ubuntu
            fi

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Syncing repo for compose file"
            if [ ! -d /opt/my-way/.git ]; then
              sudo git clone --depth 1 https://github.com/${{ github.repository }}.git /opt/my-way
            else
              sudo git -C /opt/my-way fetch --all --prune
              sudo git -C /opt/my-way reset --hard origin/${{ github.ref_name }}
            fi

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Writing runtime env"
            {
              printf '%s\n' "MYSQL_DATABASE=my_way"
              printf '%s\n' "MYSQL_USER=my_way_user"
              printf '%s\n' "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
              printf '%s\n' "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}"
              printf '%s\n' "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              printf '%s\n' "JWT_EXPIRATION_SECONDS=86400"
              printf '%s\n' "VITE_API_BASE_URL=/api/v1"
              printf '%s\n' "CORS_ALLOWED_ORIGINS=http://${{ needs.infra.outputs.ec2_ip }},http://localhost:5173"
              printf '%s\n' "BACKEND_IMAGE=ghcr.io/haithembouachir/my-way-backend:${{ github.sha }}"
              printf '%s\n' "FRONTEND_IMAGE=ghcr.io/haithembouachir/my-way-frontend:${{ github.sha }}"
            } | sudo tee /opt/my-way/.env > /dev/null

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Pulling images"
            sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml pull

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting containers"
            sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml up -d

            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Container status"
            sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml ps

      - name: Show final app URL
        run: |
          echo "App URL: http://${{ needs.infra.outputs.ec2_ip }}"
          echo "### Final App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ needs.infra.outputs.ec2_ip }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend health endpoint
        id: healthcheck
        continue-on-error: true
        run: |
          set -e
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "http://${{ needs.infra.outputs.ec2_ip }}/api/v1/health" || true)
            echo "Attempt $i HTTP=$code"
            if [ "$code" = "200" ]; then
              echo "Backend health is OK"
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Collect remote docker diagnostics
        if: steps.healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set +e
            cd /opt/my-way
            echo "=== docker compose ps ==="
            sudo docker compose -f docker-compose.prod.yml ps
            echo "=== backend logs (last 200) ==="
            sudo docker compose -f docker-compose.prod.yml logs --tail=200 backend
            echo "=== mysql logs (last 200) ==="
            sudo docker compose -f docker-compose.prod.yml logs --tail=200 mysql

      - name: Fail workflow when backend unhealthy
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "Backend health endpoint is not reachable after deploy. Check diagnostics above."
          exit 1
