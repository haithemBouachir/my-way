name: Deploy My Way

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  infra:
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform state bucket access
        run: |
          aws s3api head-bucket --bucket "${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=my-way/${{ github.actor }}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}"

      - name: Terraform output
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Show app URL
        run: |
          echo "App URL: http://${{ steps.tf_output.outputs.instance_public_ip }}"
          echo "### App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ steps.tf_output.outputs.instance_public_ip }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare lightweight transfer bundle
        run: |
          rm -rf my-way-frontend/node_modules my-way-frontend/dist my-way-backend/target
          find my-way-frontend my-way-backend -type d -name ".cache" -prune -exec rm -rf {} + || true
          echo "Transfer sizes after cleanup:"
          du -sh my-way-backend my-way-frontend docker-compose.yml

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ needs.infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,my-way-backend,my-way-frontend"
          target: "/home/ubuntu"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker ubuntu
            fi

            cd /home/ubuntu
            mkdir -p /home/ubuntu/my-way
            mv -f /home/ubuntu/docker-compose.yml /home/ubuntu/my-way/docker-compose.yml || true
            mv -f /home/ubuntu/my-way-backend /home/ubuntu/my-way/my-way-backend || true
            mv -f /home/ubuntu/my-way-frontend /home/ubuntu/my-way/my-way-frontend || true

            cat > /home/ubuntu/my-way/.env << 'EOF'
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_SECONDS=86400
            VITE_API_BASE_URL=/api/v1
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            EOF

            cd /home/ubuntu/my-way
            sudo docker compose --env-file .env up -d --build

      - name: Show final app URL
        run: |
          echo "App URL: http://${{ needs.infra.outputs.ec2_ip }}"
          echo "### Final App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ needs.infra.outputs.ec2_ip }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend health endpoint
        id: healthcheck
        continue-on-error: true
        run: |
          set -e
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "http://${{ needs.infra.outputs.ec2_ip }}/api/v1/health" || true)
            echo "Attempt $i HTTP=$code"
            if [ "$code" = "200" ]; then
              echo "Backend health is OK"
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Collect remote docker diagnostics
        if: steps.healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set +e
            cd /home/ubuntu/my-way
            echo "=== docker compose ps ==="
            sudo docker compose ps
            echo "=== backend logs (last 200) ==="
            sudo docker compose logs --tail=200 backend
            echo "=== mysql logs (last 200) ==="
            sudo docker compose logs --tail=200 mysql

      - name: Fail workflow when backend unhealthy
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "Backend health endpoint is not reachable after deploy. Check diagnostics above."
          exit 1
