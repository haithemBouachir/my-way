name: Deploy My Way

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase image owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./my-way-backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/my-way-backend:${{ github.sha }},ghcr.io/${{ env.OWNER }}/my-way-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./my-way-frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/my-way-frontend:${{ github.sha }},ghcr.io/${{ env.OWNER }}/my-way-frontend:latest
          build-args: VITE_API_BASE_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    runs-on: ubuntu-latest
    # runs in parallel with build-images
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
      ec2_instance_id: ${{ steps.tf_output.outputs.instance_id }}
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=my-way/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}"

      - name: Terraform output
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"

      - name: Show app URL
        run: |
          echo "App URL: http://${{ steps.tf_output.outputs.instance_public_ip }}"
          echo "### App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${{ steps.tf_output.outputs.instance_public_ip }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-images, infra]
    env:
      AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
      DEPLOY_HOST: ${{ needs.infra.outputs.ec2_ip }}
    steps:
      - name: Checkout (deploy fallback)
        uses: actions/checkout@v5

      - name: Setup Terraform (deploy fallback)
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (long-lived keys)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure AWS credentials (temporary session)
        if: ${{ env.AWS_SESSION_TOKEN_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Inspect EC2 network and SSH rules
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ needs.infra.outputs.ec2_instance_id }}"

          echo "EC2 instance details"
          aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].{State:State.Name,PublicIp:PublicIpAddress,Subnet:SubnetId,Vpc:VpcId,SGs:SecurityGroups[*].GroupId}' \
            --output table

          SG_IDS=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[*].GroupId' \
            --output text)

          for SG in $SG_IDS; do
            echo "Security group $SG ingress rules"
            aws ec2 describe-security-groups \
              --group-ids "$SG" \
              --query 'SecurityGroups[0].IpPermissions[?ToPort==`22` || FromPort==`22`].[IpProtocol,FromPort,ToPort,IpRanges[*].CidrIp]' \
              --output table
          done

      - name: Wait for EC2 instance status checks
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ needs.infra.outputs.ec2_instance_id }}"
          echo "Waiting for EC2 status checks to pass for $INSTANCE_ID ..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"
          aws ec2 describe-instance-status \
            --instance-ids "$INSTANCE_ID" \
            --query 'InstanceStatuses[0].{State:InstanceState.Name,System:SystemStatus.Status,Instance:InstanceStatus.Status}' \
            --output table

      - name: Wait for EC2 SSH to be ready
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ needs.infra.outputs.ec2_instance_id }}"
          host="${DEPLOY_HOST}"

          check_banner() {
            local target="$1"
            timeout 6 bash -lc "exec 3<>/dev/tcp/$target/22; head -n 1 <&3" 2>/dev/null || true
          }

          wait_banner_loop() {
            local target="$1"
            local attempts="$2"
            local wait_s="$3"
            for i in $(seq 1 "$attempts"); do
              banner=$(check_banner "$target")
              echo "Attempt $i/$attempts banner='${banner:-<none>}'"
              if echo "$banner" | grep -q '^SSH-2.0-'; then
                echo "SSH banner is ready (attempt $i)"
                return 0
              fi
              echo "Banner not ready yet, waiting ${wait_s}s..."
              sleep "$wait_s"
            done
            return 1
          }

          echo "Waiting for SSH banner on $host:22 ..."
          if wait_banner_loop "$host" 8 10; then
            echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "SSH banner unavailable. Replacing EC2 instance via Terraform fallback..."
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=my-way/terraform.tfstate" \
            -backend-config="region=us-east-1"

          timeout 1800 terraform -chdir=terraform apply -auto-approve \
            -replace=aws_instance.app \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}"

          NEW_INSTANCE_ID=$(terraform -chdir=terraform output -raw instance_id)
          NEW_HOST=$(terraform -chdir=terraform output -raw instance_public_ip)
          echo "Fallback instance id: $NEW_INSTANCE_ID"
          echo "Fallback host: $NEW_HOST"

          echo "Waiting for fallback instance status checks with bounded retries"
          status_ok=false
          for i in $(seq 1 30); do
            status=$(aws ec2 describe-instance-status \
              --instance-ids "$NEW_INSTANCE_ID" \
              --query 'InstanceStatuses[0].[SystemStatus.Status,InstanceStatus.Status]' \
              --output text 2>/dev/null || true)
            echo "Status attempt $i/30: ${status:-<none>}"
            if echo "$status" | grep -Eq '^ok[[:space:]]+ok$'; then
              status_ok=true
              break
            fi
            sleep 10
          done

          if [ "$status_ok" != true ]; then
            echo "Fallback instance status checks did not reach ok/ok in time"
            exit 1
          fi

          echo "Retrying SSH banner wait on fallback host"
          if wait_banner_loop "$NEW_HOST" 12 10; then
            echo "DEPLOY_HOST=$NEW_HOST" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "EC2 SSH banner unavailable after reboot and replace fallback"
          exit 1

      - name: Runner native SSH handshake diagnostics
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          for i in $(seq 1 3); do
            echo "Runner handshake attempt $i"
            ssh -vvv -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              -o StrictHostKeyChecking=no \
              ubuntu@${DEPLOY_HOST} "echo runner-ssh-ok" && exit 0
            sleep 5
          done

          echo "Runner native SSH handshake failed after 3 attempts"
          exit 1

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          cat > /tmp/deploy_remote.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Installing Docker if needed"
          if ! command -v docker >/dev/null 2>&1; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ca-certificates curl gnupg
            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin git
            sudo usermod -aG docker ubuntu
          fi

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Syncing repo for compose file"
          if [ ! -d /opt/my-way/.git ]; then
            sudo git clone --depth 1 https://github.com/${{ github.repository }}.git /opt/my-way
          else
            sudo git -C /opt/my-way fetch --all --prune
            sudo git -C /opt/my-way reset --hard origin/${{ github.ref_name }}
          fi

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Logging in to GHCR"
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Writing runtime env"
          {
            printf '%s\n' "MYSQL_DATABASE=my_way"
            printf '%s\n' "MYSQL_USER=my_way_user"
            printf '%s\n' "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
            printf '%s\n' "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}"
            printf '%s\n' "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            printf '%s\n' "JWT_EXPIRATION_SECONDS=86400"
            printf '%s\n' "VITE_API_BASE_URL=/api/v1"
            printf '%s\n' "CORS_ALLOWED_ORIGINS=http://${DEPLOY_HOST},http://localhost:5173"
            printf '%s\n' "BACKEND_IMAGE=ghcr.io/haithembouachir/my-way-backend:${{ github.sha }}"
            printf '%s\n' "FRONTEND_IMAGE=ghcr.io/haithembouachir/my-way-frontend:${{ github.sha }}"
          } | sudo tee /opt/my-way/.env > /dev/null

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Pulling images"
          sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml pull

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting containers"
          sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml up -d

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Container status"
          sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml ps

          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Waiting for backend internal health"
          backend_ok=false
          for i in $(seq 1 30); do
            code=$(sudo docker run --rm --network my-way_default curlimages/curl:8.8.0 -s -o /dev/null -w "%{http_code}" http://backend:8080/api/v1/health || true)
            echo "Internal backend health attempt $i/30 HTTP=$code"
            if [ "$code" = "200" ]; then
              backend_ok=true
              break
            fi
            sleep 5
          done

          if [ "$backend_ok" != true ]; then
            echo "Backend internal health did not become ready in time"
            echo "=== backend logs (last 200) ==="
            sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml logs --tail=200 backend || true
            echo "=== mysql logs (last 200) ==="
            sudo docker compose --env-file /opt/my-way/.env -f /opt/my-way/docker-compose.prod.yml logs --tail=200 mysql || true
            exit 1
          fi
          REMOTE_SCRIPT

          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=20 \
            -o StrictHostKeyChecking=no \
            ubuntu@${DEPLOY_HOST} "DEPLOY_HOST='${DEPLOY_HOST}' bash -se" < /tmp/deploy_remote.sh

      - name: Show final app URL
        run: |
          echo "App URL: http://${DEPLOY_HOST}"
          echo "### Final App URL" >> "$GITHUB_STEP_SUMMARY"
          echo "http://${DEPLOY_HOST}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend health endpoint
        id: healthcheck
        continue-on-error: true
        run: |
          set -e
          url="http://${DEPLOY_HOST}/api/v1/health"
          for i in $(seq 1 24); do
            code=$(curl -sS -D /tmp/health.headers -o /tmp/health.body -w "%{http_code}" "$url" || true)
            echo "Attempt $i HTTP=$code URL=$url"
            if [ "$code" = "200" ]; then
              echo "Backend health is OK"
              cat /tmp/health.body || true
              exit 0
            fi
            echo "Response headers (attempt $i):"
            sed -n '1,20p' /tmp/health.headers || true
            echo "Response body preview (attempt $i):"
            sed -n '1,60p' /tmp/health.body || true
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Collect remote docker diagnostics
        if: steps.healthcheck.outcome == 'failure'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ubuntu@${DEPLOY_HOST} 'bash -se' <<'REMOTE_DIAG'
          set +e
          cd /opt/my-way
          echo "=== docker compose ps ==="
          sudo docker compose -f docker-compose.prod.yml ps
          echo "=== docker compose ps (all) ==="
          sudo docker compose -f docker-compose.prod.yml ps -a
          echo "=== backend logs (last 200) ==="
          sudo docker compose -f docker-compose.prod.yml logs --tail=200 backend
          echo "=== mysql logs (last 200) ==="
          sudo docker compose -f docker-compose.prod.yml logs --tail=200 mysql
          echo "=== frontend logs (last 200) ==="
          sudo docker compose -f docker-compose.prod.yml logs --tail=200 frontend
          echo "=== frontend nginx config ==="
          sudo docker exec myway-frontend nginx -T | sed -n '1,220p'
          echo "=== direct backend health from Docker network ==="
          sudo docker run --rm --network my-way_default curlimages/curl:8.8.0 -sS -i http://backend:8080/api/v1/health
          echo "=== frontend->backend health via nginx inside Docker network ==="
          sudo docker run --rm --network my-way_default curlimages/curl:8.8.0 -sS -i http://frontend/api/v1/health
          REMOTE_DIAG

      - name: Fail workflow when backend unhealthy
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "Backend health endpoint is not reachable after deploy. Check diagnostics above."
          exit 1
