services:
  mysql:
    image: mysql:8.4
    container_name: myway-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myway}
      MYSQL_USER: ${MYSQL_USER:-myway_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-myway_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./my-way-backend
    container_name: myway-backend
    restart: always
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secure_jwt_secret}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-myway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-myway_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-myway_password}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./my-way-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: myway-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
