apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: my-way-backend
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - my-way
  selector:
    matchLabels:
      app: my-way-backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
